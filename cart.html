<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - ArqivaMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Custom Checkbox Color */
        input[type="checkbox"] { accent-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-md mx-auto bg-slate-50 min-h-screen relative shadow-2xl flex flex-col">
        
        <header class="sticky top-0 z-50 bg-white pt-4 pb-3 px-4 border-b flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-slate-500 hover:text-slate-800 transition">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </a>
                <h1 class="text-lg font-bold text-slate-800">Keranjang Belanja</h1>
            </div>
            <button class="text-sm text-red-500 font-semibold hover:text-red-600 transition">Hapus</button>
        </header>

        <main class="flex-1 overflow-y-auto pb-40">
            
            <section class="mt-2 bg-white px-4 py-3 border-y border-slate-100">
                <div class="flex items-center gap-2 mb-4 border-b pb-2">
                    <input type="checkbox" class="w-4 h-4 rounded cursor-pointer" checked>
                    <i class="fa-solid fa-store text-indigo-600 text-sm"></i>
                    <h2 class="font-bold text-sm text-slate-800">ArqivaMarket Official</h2>
                </div>

                <div class="flex gap-3 items-start mb-5">
                    <input type="checkbox" class="w-4 h-4 mt-4 rounded cursor-pointer" checked>
                    
                    <div class="w-20 h-20 bg-slate-200 rounded-xl flex-shrink-0 flex items-center justify-center text-slate-400">
                        <i class="fa-regular fa-image text-2xl"></i>
                    </div>
                    
                    <div class="flex-1">
                        <h3 class="text-sm font-semibold text-slate-800 leading-tight">Keyboard Mechanical RGB Switch Blue</h3>
                        <p class="text-[10px] text-slate-400 mt-1">Varian: Hitam</p>
                        <div class="flex justify-between items-end mt-2">
                            <span class="text-indigo-600 font-bold text-sm">Rp 450.000</span>
                            
                            <div class="flex items-center border border-slate-200 rounded-lg">
                                <button class="w-7 h-7 text-slate-500 flex items-center justify-center hover:bg-slate-100 rounded-l-lg">-</button>
                                <span class="w-8 text-center text-sm font-semibold">1</span>
                                <button class="w-7 h-7 text-indigo-600 flex items-center justify-center hover:bg-indigo-50 rounded-r-lg">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 items-start">
                    <input type="checkbox" class="w-4 h-4 mt-4 rounded cursor-pointer" checked>
                    
                    <div class="w-20 h-20 bg-slate-200 rounded-xl flex-shrink-0 flex items-center justify-center text-slate-400">
                        <i class="fa-regular fa-image text-2xl"></i>
                    </div>
                    
                    <div class="flex-1">
                        <h3 class="text-sm font-semibold text-slate-800 leading-tight">Mouse Wireless Pro Silent Click</h3>
                        <p class="text-[10px] text-red-500 mt-1 font-medium"><i class="fa-solid fa-circle-exclamation"></i> Sisa 5 di POS</p>
                        <div class="flex justify-between items-end mt-2">
                            <span class="text-indigo-600 font-bold text-sm">Rp 210.000</span>
                            
                            <div class="flex items-center border border-slate-200 rounded-lg">
                                <button class="w-7 h-7 text-slate-500 flex items-center justify-center hover:bg-slate-100 rounded-l-lg">-</button>
                                <span class="w-8 text-center text-sm font-semibold">1</span>
                                <button class="w-7 h-7 text-indigo-600 flex items-center justify-center hover:bg-indigo-50 rounded-r-lg">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

        <div class="fixed bottom-[72px] w-full max-w-md bg-white border-t px-4 py-3 flex justify-between items-center z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="flex items-center gap-2">
                <input type="checkbox" class="w-5 h-5 rounded cursor-pointer" checked>
                <span class="text-xs text-slate-500">Pilih Semua</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500">Total Pembayaran</p>
                    <p class="text-indigo-600 font-bold text-base">Rp 660.000</p>
                </div>
                <a href="transaction.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition">
                    Beli (2)
                </a>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-lg border-t px-6 py-3 flex justify-between items-center z-50">
            <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="search.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition">
                <i class="fa-solid fa-magnifying-glass text-lg"></i>
                <span class="text-[10px] font-medium">Cari</span>
            </a>
            <a href="cart.html" class="flex flex-col items-center gap-1 -mt-8 hover:scale-105 transition-transform">
                <div class="bg-indigo-600 w-12 h-12 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white text-lg">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <span class="text-[10px] font-bold text-indigo-600 mt-1">Keranjang</span>
            </a>
            <a href="transaction.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition">
                <i class="fa-solid fa-receipt text-lg"></i>
                <span class="text-[10px] font-medium">Transaksi</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 transition">
                <i class="fa-solid fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </nav>

    </div>

</body>
</html>
